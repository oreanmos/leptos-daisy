# Validator Component Manifest
#
# DaisyUI Validator component documentation for leptos-daisyui

name: Validator
doc: https://daisyui.com/components/validator/

base:
  - "validator"

parts:
  - name: "label"
    description: "Validation helper text"
    classes: ["validator-label"]

modifiers:
  state: []

patterns:
  - "with-fieldset"
  - "error-state"
  - "success-state"
  - "reactive-hint"

examples:
  - id: "basic"
    description: "Basic validator wrapper"
  - id: "error"
    description: "Validator with error state"
  - id: "success"
    description: "Validator with success state"
  - id: "with-hint"
    description: "Validator with label message"
  - id: "reactive"
    description: "Validator with reactive status text"
