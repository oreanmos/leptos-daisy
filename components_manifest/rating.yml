# Rating Component Manifest
#
# DaisyUI Rating component documentation for leptos-daisyui

name: Rating
doc: https://daisyui.com/components/rating/

base:
  - "rating"

parts:
  - name: "rating"
    description: "The rating container"
    classes: ["rating"]
  - name: "input"
    description: "Individual star input elements"
    classes: ["mask", "mask-star", "mask-star-2", "mask-heart", "mask-heart-fill", "mask-half-1", "mask-half-2"]

modifiers:
  # Size modifiers
  size:
    - "rating-xs"
    - "rating-sm"
    - "rating-md"
    - "rating-lg"
    - "rating-xl"
  
  # Other modifiers
  other:
    - "rating-half"
    - "rating-hidden"

patterns:
  - "half-stars"
  - "custom-masks"
  - "disabled"
  - "reactive-selection"

examples:
  - id: "basic"
    description: "Basic 5-star rating"
  - id: "all-sizes"
    description: "Shows all size variants"
  - id: "half-stars"
    description: "Rating with half-star precision"
  - id: "mask-shapes"
    description: "Rating with different mask shapes"
  - id: "disabled"
    description: "Disabled rating"
  - id: "interactive"
    description: "Interactive rating with reactive selected value"

accessibility:
  semantic_element: "div"
  aria_attributes:
    - "aria-label"
    - "aria-labelledby"
    - "aria-describedby"
  keyboard_navigation: true
  default_attributes:
    role: "slider"
    aria-orientation: "horizontal"

status:
  tier_a: true # Pure wrapper implemented
  tier_b: false # No interactive helper needed for basic rating
  tested: true
  documented: true

notes: |
  The rating component supports all DaisyUI rating variants and features.
  
  Special considerations:
  - Always include proper ARIA attributes for accessibility
  - Rating value should be between 0 and max_stars
  - Half-star ratings require proper mask classes
  - Consider using rating components for user feedback and reviews
  - Rating components should be keyboard navigable
  - For read-only ratings, use disabled state
