# Artboard Component Manifest
#
# DaisyUI Artboard component documentation for leptos-daisyui
# https://daisyui.com/components/artboard/

name: Artboard
doc: https://daisyui.com/components/artboard/

base:
  - "artboard"

parts: []

modifiers:
  # Size modifiers
  size:
    - "artboard-phone-1"
    - "artboard-phone-2"
    - "artboard-phone-3"
    - "artboard-phone-4"
    - "artboard-phone-5"
    - "artboard-phone-6"

  # Orientation modifiers
  orientation:
    - "artboard-horizontal"

  # Demo mode
  demo:
    - "artboard-demo"

patterns:
  - "phone-mockup"
  - "screenshot-preview"
  - "mobile-design-showcase"
  - "app-demo"

examples:
  - id: "basic"
    description: "Basic artboard with default size"
  - id: "phone-sizes"
    description: "All phone size variants"
  - id: "horizontal"
    description: "Horizontal orientation"
  - id: "demo-mode"
    description: "Artboard with demo grid background"

accessibility:
  semantic_element: "div"
  aria_attributes:
    - "aria-label"
    - "aria-describedby"
    - "tabindex"
  keyboard_navigation: false
  notes: |
    Artboard is a visual presentation component.
    Add aria-label to describe what is being showcased.
    Use tabindex="0" for focusable artboards when needed.

props:
  - name: "size"
    type: "ArtboardSize enum"
    values: ["Phone1", "Phone2", "Phone3", "Phone4", "Phone5", "Phone6"]
    default: "Phone6"
  - name: "horizontal"
    type: "bool"
    default: "false"
  - name: "demo"
    type: "bool"
    default: "false"
  - name: "class"
    type: "MaybeProp<String>"
    description: "Additional CSS classes"

status:
  tier_a: true
  tier_b: false
  tested: true
  documented: true
