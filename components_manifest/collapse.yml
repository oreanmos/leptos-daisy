# Collapse Component Manifest
#
# DaisyUI Collapse component documentation for leptos-daisyui

name: Collapse
doc: https://daisyui.com/components/collapse/

base:
  - "collapse"

parts:
  - name: "CollapseTitle"
    classes:
      - "collapse-title"
    description: "Collapse title/heading"
  - name: "CollapseContent"
    classes:
      - "collapse-content"
    description: "Collapsible content area"
  - name: "Accordion"
    classes:
      - "join"
      - "join-vertical"
      - "w-full"
    description: "Container for grouped accordion items"

modifiers:
  # Trigger types (implementation-based)
  trigger:
    - "checkbox"
    - "details"
    - "radio"

  icon:
    - "collapse-arrow"
    - "collapse-plus"

  # State
  state:
    - "collapse-open"
    - "collapse-close"

patterns:
  - name: "checkbox"
    description: "Checkbox-based collapse toggle"
  - name: "details"
    description: "Details/summary-based collapse"
  - name: "accordion"
    description: "Radio-based accordion (only one open at a time)"
  - name: "with_arrow"
    description: "Collapse with arrow indicator"
  - name: "with_plus"
    description: "Collapse with plus/minus indicator"

examples:
  - "collapse_basic_radio_group"
  - "collapse_checkbox_icon_arrow"
  - "collapse_checkbox_icon_plus"
  - "collapse_details"
  - "collapse_details_open_default"
  - "collapse_accordion"
  - "collapse_forced_open"
  - "collapse_forced_close"
  - "collapse_parts_custom_title"
